<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started — Recovery App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens (inline — standalone prototype) ── */
    :root {
      --bg:             #f6f2ea;
      --surface:        #ffffff;
      --surface-2:      #fbf8f2;
      --ink-900:        #1b2421;
      --ink-700:        #3a4643;
      --ink-500:        #667571;
      --ink-300:        #9aa6a2;
      --sage-700:       #2f5550;
      --sage-600:       #3b6a64;
      --sage-100:       #dde9e5;
      --sage-50:        #edf3f1;
      --radius-sm:      10px;
      --radius-md:      16px;
      --radius-lg:      24px;
      --radius-pill:    999px;
      --shadow-soft:    0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.05);
      --ease:           cubic-bezier(.22,.61,.36,1);
      --focus-ring:     0 0 0 3px var(--surface), 0 0 0 5px var(--sage-700);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--ink-900);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Shell ─────────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Progress bar ──────────────────────────────────── */
    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--sage-100);
      position: relative;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--sage-700);
      border-radius: 0 var(--radius-pill) var(--radius-pill) 0;
      transition: width 0.45s var(--ease);
    }

    /* ── Step counter ──────────────────────────────────── */
    .step-counter {
      padding: 20px 24px 0;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-300);
    }

    /* ── Card ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      margin: 16px 16px 0;
      padding: 32px 24px 28px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Step visibility + transitions ─────────────────── */
    .step { display: none; flex-direction: column; flex: 1; }
    .step.active {
      display: flex;
      animation: fadeUp 0.35s var(--ease);
    }
    .step.exit {
      animation: fadeOut 0.2s var(--ease) forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-8px); }
    }

    /* ── Typography ────────────────────────────────────── */
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--ink-900);
      margin-bottom: 8px;
    }
    .sub {
      font-size: 16px;
      color: var(--ink-700);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── Inputs ────────────────────────────────────────── */
    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-500);
      margin-bottom: 8px;
      display: block;
    }
    input[type="text"],
    input[type="datetime-local"],
    textarea {
      width: 100%;
      border: 1.5px solid var(--sage-100);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 16px;
      font-family: 'Inter', inherit;
      color: var(--ink-900);
      background: var(--surface-2);
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.5;
      -webkit-appearance: none;
    }
    input[type="text"]:focus,
    input[type="datetime-local"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--sage-700);
      background: var(--surface);
    }
    input[type="text"]:focus-visible,
    input[type="datetime-local"]:focus-visible,
    textarea:focus-visible {
      box-shadow: var(--focus-ring);
    }
    input::placeholder,
    textarea::placeholder { color: var(--ink-300); }
    textarea {
      resize: none;
    }

    /* ── Addiction type cards ───────────────────────────── */
    .addiction-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .type-card {
      background: var(--surface-2);
      border: 1.5px solid var(--sage-100);
      border-radius: var(--radius-md);
      padding: 14px 8px 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      user-select: none;
    }
    .type-card:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }
    .type-card .card-icon {
      font-size: 24px;
      line-height: 1;
    }
    .type-card .card-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-500);
      text-align: center;
      line-height: 1.3;
    }
    .type-card:hover {
      background: var(--sage-50);
      border-color: var(--sage-100);
    }
    .type-card.selected {
      background: var(--sage-50);
      border-color: var(--sage-700);
    }
    .type-card.selected .card-label {
      color: var(--sage-700);
    }
    .type-card:active { transform: scale(0.96); }

    /* ── Reassurance text ──────────────────────────────── */
    .reassurance {
      font-size: 14px;
      color: var(--ink-500);
      line-height: 1.6;
      margin-top: 16px;
      text-align: center;
      font-style: italic;
    }

    /* ── Optional freetext label ───────────────────────── */
    .optional-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-300);
      margin-bottom: 8px;
      display: block;
    }

    /* ── Primary button ────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 17px;
      border-radius: var(--radius-pill);
      border: none;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', inherit;
      letter-spacing: 0;
      cursor: not-allowed;
      background: var(--ink-300);
      color: #fff;
      transition: background 0.3s var(--ease), transform 0.2s var(--ease), box-shadow 0.3s var(--ease);
      -webkit-tap-highlight-color: transparent;
      margin-top: auto;
    }
    .btn-primary .arrow {
      display: inline-block;
      transition: transform 0.2s var(--ease);
    }
    .btn-primary.ready {
      background: var(--sage-700);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(47,85,80,.2);
    }
    .btn-primary.ready:hover {
      background: var(--sage-600);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(47,85,80,.28);
    }
    .btn-primary.ready:hover .arrow { transform: translateX(4px); }
    .btn-primary.ready:active { transform: scale(0.97); }
    .btn-primary.ready:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    /* ── Spacer ─────────────────────────────────────────── */
    .spacer { flex: 1; min-height: 20px; }

    /* ── Step 4 textarea ───────────────────────────────── */
    #why-textarea {
      min-height: 120px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
<div class="shell" role="main">

  <!-- Progress bar -->
  <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="25" aria-label="Onboarding progress" id="progress-bar-wrap">
    <div class="progress-fill" id="progress-fill" style="width: 25%"></div>
  </div>

  <!-- Step counter -->
  <p class="step-counter" id="step-counter" aria-live="polite">Step 1 of 4</p>

  <!-- Card -->
  <div class="card" id="onboarding-card">

    <!-- ── Step 1: Name ─────────────────────────────────── -->
    <div class="step active" id="step-1" aria-label="Step 1: Your name">
      <h1>Welcome.</h1>
      <p class="sub">Let's get you set up.</p>

      <label class="field-label" for="name-input">What should we call you?</label>
      <input
        type="text"
        id="name-input"
        placeholder="Your first name"
        maxlength="40"
        autocomplete="given-name"
        aria-required="true"
        autofocus
      />

      <div class="spacer"></div>

      <button class="btn-primary" id="btn-step1" disabled aria-disabled="true">
        Continue <span class="arrow">→</span>
      </button>
    </div>

    <!-- ── Step 2: Addiction type ───────────────────────── -->
    <div class="step" id="step-2" aria-label="Step 2: What you're working on">
      <h1>What are you working on?</h1>
      <p class="sub">This helps us personalise your experience.</p>

      <div class="addiction-grid" role="radiogroup" aria-label="Select what you're working on">
        <button type="button" class="type-card" data-type="Alcohol" aria-pressed="false" role="radio" aria-checked="false">
          <span class="card-icon" aria-hidden="true">🍷</span>
          <span class="card-label">Alcohol</span>
        </button>
        <button type="button" class="type-card" data-type="Drugs" aria-pressed="false" role="radio" aria-checked="false">
          <span class="card-icon" aria-hidden="true">💊</span>
          <span class="card-label">Drugs</span>
        </button>
        <button type="button" class="type-card" data-type="Nicotine" aria-pressed="false" role="radio" aria-checked="false">
          <span class="card-icon" aria-hidden="true">🚬</span>
          <span class="card-label">Nicotine</span>
        </button>
        <button type="button" class="type-card" data-type="Gambling" aria-pressed="false" role="radio" aria-checked="false">
          <span class="card-icon" aria-hidden="true">🎲</span>
          <span class="card-label">Gambling</span>
        </button>
        <button type="button" class="type-card" data-type="Social Media" aria-pressed="false" role="radio" aria-checked="false">
          <span class="card-icon" aria-hidden="true">📱</span>
          <span class="card-label">Social Media</span>
        </button>
        <button type="button" class="type-card" data-type="Gaming" aria-pressed="false" role="radio" aria-checked="false">
          <span class="card-icon" aria-hidden="true">🎮</span>
          <span class="card-label">Gaming</span>
        </button>
        <button type="button" class="type-card" data-type="Other" aria-pressed="false" role="radio" aria-checked="false" style="grid-column: 2">
          <span class="card-icon" aria-hidden="true">✦</span>
          <span class="card-label">Other</span>
        </button>
      </div>

      <label class="optional-label" for="addiction-specific">Want to be more specific? <span style="color:var(--ink-300)">(optional)</span></label>
      <input
        type="text"
        id="addiction-specific"
        placeholder="e.g. Wine, Vaping, TikTok"
        maxlength="80"
        autocomplete="off"
      />

      <div class="spacer"></div>

      <button class="btn-primary" id="btn-step2" disabled aria-disabled="true">
        Continue <span class="arrow">→</span>
      </button>
    </div>

    <!-- ── Step 3: Start date ───────────────────────────── -->
    <div class="step" id="step-3" aria-label="Step 3: Your start date">
      <h1>When did you start?</h1>
      <p class="sub">This sets your streak counter.</p>

      <label class="field-label" for="start-date">Date and time</label>
      <input
        type="datetime-local"
        id="start-date"
        aria-required="true"
      />

      <p class="reassurance">It's okay if this was just now.<br>Every journey starts somewhere.</p>

      <div class="spacer"></div>

      <button class="btn-primary ready" id="btn-step3">
        Continue <span class="arrow">→</span>
      </button>
    </div>

    <!-- ── Step 4: Find your why ────────────────────────── -->
    <div class="step" id="step-4" aria-label="Step 4: Your reason">
      <h1>Find your why.</h1>
      <p class="sub">Remind your future self why you started.</p>

      <label class="field-label" for="why-textarea">Your reason <span style="color:var(--ink-300);font-weight:400">(optional)</span></label>
      <textarea
        id="why-textarea"
        rows="5"
        maxlength="500"
        placeholder="I want to quit because..."
        aria-label="Your personal reason for starting this journey"
      ></textarea>

      <div class="spacer"></div>

      <button class="btn-primary ready" id="btn-step4">
        Start my journey <span class="arrow">→</span>
      </button>
    </div>

  </div><!-- /card -->
</div><!-- /shell -->

<script>
  // ── Guard: skip onboarding if already complete ─────────
  if (localStorage.getItem('onboardingComplete') === 'true') {
    window.location.replace('../index.html');
  }

  // ── State ──────────────────────────────────────────────
  const state = {
    currentStep: 1,
    userName: '',
    addictionType: '',
    addictionSpecific: '',
    sobrietyStartDate: '',
    personalWhy: ''
  };

  const totalSteps = 4;

  // ── DOM refs ───────────────────────────────────────────
  const progressFill  = document.getElementById('progress-fill');
  const progressWrap  = document.getElementById('progress-bar-wrap');
  const stepCounter   = document.getElementById('step-counter');

  const nameInput     = document.getElementById('name-input');
  const btnStep1      = document.getElementById('btn-step1');

  const typeCards     = document.querySelectorAll('.type-card');
  const specificInput = document.getElementById('addiction-specific');
  const btnStep2      = document.getElementById('btn-step2');

  const startDate     = document.getElementById('start-date');
  const btnStep3      = document.getElementById('btn-step3');

  const whyTextarea   = document.getElementById('why-textarea');
  const btnStep4      = document.getElementById('btn-step4');

  // ── Initialise datetime-local to now ──────────────────
  (function setDefaultDate() {
    const now = new Date();
    // datetime-local expects "YYYY-MM-DDTHH:MM"
    const pad = n => String(n).padStart(2, '0');
    const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    startDate.value = local;
    startDate.max = local; // can't pick a future start date
  })();

  // ── Progress bar + counter ─────────────────────────────
  function updateProgress(step) {
    const pct = Math.round((step / totalSteps) * 100);
    progressFill.style.width = pct + '%';
    progressWrap.setAttribute('aria-valuenow', pct);
    stepCounter.textContent = `Step ${step} of ${totalSteps}`;
  }

  // ── Step transitions ───────────────────────────────────
  function goToStep(nextStep) {
    const currentEl = document.getElementById(`step-${state.currentStep}`);
    const nextEl    = document.getElementById(`step-${nextStep}`);

    currentEl.classList.add('exit');
    setTimeout(() => {
      currentEl.classList.remove('active', 'exit');
      nextEl.classList.add('active');
      // Focus first focusable element in next step
      const firstFocusable = nextEl.querySelector('input, textarea, button');
      if (firstFocusable) firstFocusable.focus();
    }, 200);

    state.currentStep = nextStep;
    updateProgress(nextStep);
  }

  // ── Step 1: Name ───────────────────────────────────────
  function checkStep1() {
    const val = nameInput.value.trim();
    const ready = val.length > 0;
    btnStep1.disabled = !ready;
    btnStep1.setAttribute('aria-disabled', String(!ready));
    btnStep1.classList.toggle('ready', ready);
  }

  nameInput.addEventListener('input', checkStep1);

  btnStep1.addEventListener('click', () => {
    if (btnStep1.disabled) return;
    state.userName = nameInput.value.trim();
    goToStep(2);
  });

  // ── Step 2: Addiction type ─────────────────────────────
  typeCards.forEach(card => {
    card.addEventListener('click', () => {
      typeCards.forEach(c => {
        c.classList.remove('selected');
        c.setAttribute('aria-pressed', 'false');
        c.setAttribute('aria-checked', 'false');
      });
      card.classList.add('selected');
      card.setAttribute('aria-pressed', 'true');
      card.setAttribute('aria-checked', 'true');
      state.addictionType = card.dataset.type;
      checkStep2();
    });

    // Arrow key navigation within grid
    card.addEventListener('keydown', e => {
      const cards = Array.from(typeCards);
      const idx = cards.indexOf(card);
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        cards[(idx + 1) % cards.length].focus();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        cards[(idx - 1 + cards.length) % cards.length].focus();
      }
    });
  });

  function checkStep2() {
    const ready = state.addictionType.length > 0;
    btnStep2.disabled = !ready;
    btnStep2.setAttribute('aria-disabled', String(!ready));
    btnStep2.classList.toggle('ready', ready);
  }

  btnStep2.addEventListener('click', () => {
    if (btnStep2.disabled) return;
    state.addictionSpecific = specificInput.value.trim();
    goToStep(3);
  });

  // ── Step 3: Start date ─────────────────────────────────
  btnStep3.addEventListener('click', () => {
    state.sobrietyStartDate = startDate.value
      ? new Date(startDate.value).toISOString()
      : new Date().toISOString();
    goToStep(4);
  });

  // ── Step 4: Why + save ─────────────────────────────────
  btnStep4.addEventListener('click', () => {
    state.personalWhy = whyTextarea.value.trim();
    saveAndComplete();
  });

  function saveAndComplete() {
    localStorage.setItem('userName',          state.userName);
    localStorage.setItem('addictionType',     state.addictionType);
    localStorage.setItem('addictionSpecific', state.addictionSpecific);
    localStorage.setItem('sobrietyStartDate', state.sobrietyStartDate);
    localStorage.setItem('personalWhy',       state.personalWhy);
    localStorage.setItem('onboardingComplete','true');

    // Brief fade-out before redirect
    document.querySelector('.shell').style.transition = 'opacity 0.4s';
    document.querySelector('.shell').style.opacity = '0';
    setTimeout(() => {
      window.location.replace('../index.html');
    }, 400);
  }
</script>
</body>
</html>
